      weight: 3
    - name: Industry
      url: "/industry/"
      weight: 4
    - name: Service
      url: "/service/"
      weight: 5
    - name: Awards
      url: "/awards/"
      weight: 6
    - name: Presentations
      url: "/presentations/"
      weight: 7
    - name: Miscellaneous
      url: "/miscellaneous/"
